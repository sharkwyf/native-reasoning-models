hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  max_prompt_length: 4096
  max_think_length: 4096
  max_response_length: 4096

actor_rollout_ref:
  rollout:
    max_tokens: ${data.max_think_length}
    stop:
      - "<|"
    detokenize: true
    skip_special_tokens: false
  actor:
    clip_ratio_low: 0.8
    clip_ratio_high: 1.28
    use_nrt_loss: true
    trace_loss_coef: 1.0
    response_prefix_loss_coef: 1.0
    token_loss_coef: 1.0
    loss_agg_mode: seq-mean-token-sum-norm
    loss_scale_factor: 512
    cispo_clip_ratio_low: 0.8
    cispo_clip_ratio_high: 1.28
    optim:
      lr: 2e-6
      lr_warmup_steps_ratio: 0.1
      weight_decay: 0.01
      lr_warmup_steps: -1
      betas: [0.9, 0.95]
      eps: 1e-15
      # betas: [0.9, 0.999]
      # eps: 1e-8

custom_reward_function:
  path: recipe/nrt/reward_score.py
  name: compute_prob_mean_reward

algorithm:
  response_format: default
  reward_agg_mode: log_prob
  center_reward_by: mean
  scale_reward_by: std
  use_fixed_token_reward: true


trainer:
  project_name: verl-nrt